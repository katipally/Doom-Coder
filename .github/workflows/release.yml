name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Build & Release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD=$(echo "$VERSION" | tr -d '.')
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "BUILD=${BUILD}" >> $GITHUB_ENV
          echo "TAG=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Update version in project
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ env.VERSION }}" DoomCoder/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ env.BUILD }}" DoomCoder/Info.plist

      - name: Resolve Swift Packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project DoomCoder.xcodeproj \
            -scheme DoomCoder

      - name: Build Release Archive
        run: |
          xcodebuild \
            -project DoomCoder.xcodeproj \
            -scheme DoomCoder \
            -configuration Release \
            -archivePath build/DoomCoder.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            MARKETING_VERSION="${{ env.VERSION }}" \
            CURRENT_PROJECT_VERSION="${{ env.BUILD }}"

      - name: Ad-hoc sign app (proper bottom-up component signing)
        run: |
          cp -R "build/DoomCoder.xcarchive/Products/Applications/DoomCoder.app" .

          # Remove any quarantine / build-artifact extended attributes
          xattr -cr DoomCoder.app

          APP="DoomCoder.app"
          SPARKLE_FW="$APP/Contents/Frameworks/Sparkle.framework"
          SPARKLE_VER="$SPARKLE_FW/Versions/B"

          # --- Bottom-up signing (innermost first, outermost last) ---
          # codesign --deep is DEPRECATED (macOS 13+) and produces unreliable
          # signatures on nested components. Sign each item individually.

          # 1. Sign Sparkle XPC Services (deepest nested bundles)
          for xpc in "$SPARKLE_VER/XPCServices/Installer.xpc" \
                     "$SPARKLE_VER/XPCServices/Downloader.xpc"; do
            if [ -d "$xpc" ]; then
              echo "Signing: $xpc"
              codesign --force --options runtime --sign - "$xpc"
            fi
          done

          # 2. Sign Sparkle helper apps and tools
          if [ -d "$SPARKLE_VER/Updater.app" ]; then
            echo "Signing: Updater.app"
            codesign --force --options runtime --sign - "$SPARKLE_VER/Updater.app"
          fi
          if [ -f "$SPARKLE_VER/Autoupdate" ]; then
            echo "Signing: Autoupdate"
            codesign --force --options runtime --sign - "$SPARKLE_VER/Autoupdate"
          fi

          # 3. Sign the Sparkle framework itself (after all its children)
          echo "Signing: Sparkle.framework"
          codesign --force --options runtime --sign - "$SPARKLE_FW"

          # 4. Sign the main app bundle last (seals everything)
          # Include entitlements to disable library validation — required for
          # ad-hoc signing with hardened runtime + embedded frameworks
          echo "Signing: DoomCoder.app (with entitlements)"
          codesign --force --options runtime --sign - \
            --entitlements DoomCoder/DoomCoder.entitlements "$APP"

          # --- Verify every component ---
          echo ""
          echo "=== Verifying signatures ==="
          codesign --verify --strict --verbose=2 "$APP" 2>&1
          echo ""
          echo "=== Main app signature ==="
          codesign -dvv "$APP" 2>&1
          echo ""
          echo "=== Sparkle framework signature ==="
          codesign -dvv "$SPARKLE_FW" 2>&1

      - name: Create ZIP
        run: |
          zip -r --symlinks "DoomCoder-${{ env.VERSION }}.zip" DoomCoder.app

      - name: Download Sparkle tools
        run: |
          SPARKLE_VER="2.9.1"
          curl -sL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VER}/Sparkle-${SPARKLE_VER}.tar.xz" \
            -o sparkle.tar.xz
          mkdir sparkle-tools
          tar xf sparkle.tar.xz -C sparkle-tools
          chmod +x sparkle-tools/bin/*

      - name: Sign ZIP with Sparkle EdDSA
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          # Pipe key via stdin — correct Sparkle 2.x API (env var not supported)
          # -p flag outputs ONLY the base64 signature, no parsing needed
          SPARKLE_SIG=$(echo "${SPARKLE_PRIVATE_KEY}" | \
            sparkle-tools/bin/sign_update --ed-key-file - -p "DoomCoder-${{ env.VERSION }}.zip")
          ZIP_SIZE=$(stat -f%z "DoomCoder-${{ env.VERSION }}.zip")

          echo "Signature: $SPARKLE_SIG"
          echo "Zip size:  $ZIP_SIZE"
          echo "SPARKLE_SIG=${SPARKLE_SIG}" >> $GITHUB_ENV
          echo "ZIP_SIZE=${ZIP_SIZE}" >> $GITHUB_ENV

      - name: Update appcast.xml
        run: |
          python3 scripts/update_appcast.py \
            --version "${{ env.VERSION }}" \
            --build "${{ env.BUILD }}" \
            --signature "${{ env.SPARKLE_SIG }}" \
            --size "${{ env.ZIP_SIZE }}" \
            --download-url "https://github.com/katipally/Doom-Coder/releases/download/${{ env.TAG }}/DoomCoder-${{ env.VERSION }}.zip"

      - name: Commit updated appcast.xml
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage ALL modified tracked files (Info.plist, appcast.xml, Package.resolved, etc.)
          # so there are zero unstaged changes before the rebase
          git add -A
          git commit -m "chore: update appcast.xml for ${{ env.TAG }}" || echo "No changes to commit"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Doom Coder ${{ env.TAG }}"
          files: DoomCoder-${{ env.VERSION }}.zip
          generate_release_notes: true
          body: |
            ## 📦 Installation

            1. Download **`DoomCoder-${{ env.VERSION }}.zip`** below
            2. Unzip and drag **`DoomCoder.app`** to your `/Applications` folder

            ### ⚠️ Opening for the first time (macOS Gatekeeper)

            This app is **ad-hoc signed but not notarized** (notarization requires a $99/yr Apple Developer account). macOS will block it on first launch.

            **macOS 15 (Sequoia) / macOS 26 and later:**

            1. Double-click `DoomCoder.app` — you'll see a warning. Click **Done**.
            2. Open **System Settings → Privacy & Security**
            3. Scroll down to the **Security** section — you'll see _"DoomCoder" was blocked_
            4. Click **Open Anyway** → enter your password → click **Open**

            You only need to do this **once**. After that, it opens normally forever.

            **Alternative — Terminal method:**
            ```bash
            xattr -cr /Applications/DoomCoder.app
            open /Applications/DoomCoder.app
            ```
            If the terminal method alone doesn't work, also follow the System Settings steps above.

            **macOS 14 (Sonoma) and earlier:**
            Right-click `DoomCoder.app` → **Open** → click **Open** at the warning dialog.

            ## ✅ Verify it's working

            After enabling Doom Coder, run this in Terminal:
            ```bash
            pmset -g assertions | grep DoomCoder
            ```
            You should see: `PreventUserIdleDisplaySleep named: "DoomCoder: Preventing sleep for AI coding session"`

            ---
            Full changelog: [CHANGELOG.md](https://github.com/katipally/Doom-Coder/blob/main/CHANGELOG.md)
